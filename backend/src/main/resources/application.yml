server:
  port: 8080

spring:
  application:
    name: firma-management
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/firma_management?options=-c%20client_encoding%3DUTF8}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 25MB

app:
  jwt:
    secret: ${JWT_SECRET:ZmlybWFNYW5hZ2VtZW50RGV2U2VjcmV0S2V5MTIzNDU2Nzg5MDEyMzQ1Ng==}
    expiration-ms: 86400000   # 24h
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin}
  upload:
    endpoint: ${S3_ENDPOINT:https://nbg1.your-objectstorage.com}
    bucket: ${S3_BUCKET:cinw-dokument-storage}
    access-key: ${S3_ACCESS_KEY:O7WOVRGH6T26S1GKQ1KF}
    secret-key: ${S3_SECRET_KEY:EQi9kWtmNMc5Anp18qUYZSBl26P7K6X2ATO5XHSJ}
    region: ${S3_REGION:eu-central-1}
    presigned-url-ttl-minutes: 15
    allowed-mime-types:
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - image/jpeg
      - image/png

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
